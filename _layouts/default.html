<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-brand">
        <h1 class="site-title"><a href="{{ '/' | relative_url }}">📚 {{ site.title }}</a></h1>
        <p class="site-description">{{ site.description }}</p>
      </div>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.site-nav').classList.toggle('open')">☰</button>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>🏠 首页</a>
        <a href="{{ '/case-summaries/' | relative_url }}" {% if page.url == '/case-summaries/' %}class="active"{% endif %}>🔧 故障案例</a>
        <a href="{{ '/deep-dive/' | relative_url }}" {% if page.url == '/deep-dive/' %}class="active"{% endif %}>📖 知识深潜</a>
        <a href="{{ '/scenario-maps/' | relative_url }}" {% if page.url == '/scenario-maps/' %}class="active"{% endif %}>🗺️ 场景导航</a>
        <a href="{{ '/ai-learning/' | relative_url }}" {% if page.url == '/ai-learning/' %}class="active"{% endif %}>🤖 AI 学习</a>
        <a href="{{ '/math-education/' | relative_url }}" {% if page.url == '/math-education/' %}class="active"{% endif %}>📐 数学教育</a>
        <a href="{{ '/tsg/' | relative_url }}" {% if page.url == '/tsg/' %}class="active"{% endif %}>🛠️ 排查指南</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('code.language-mermaid').forEach(function(el) {
        var pre = el.parentElement;
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        pre.parentElement.replaceChild(div, pre);
      });
      mermaid.run();
    });
  </script>
</body>
</html>
