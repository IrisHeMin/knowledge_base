<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-brand">
        <h1 class="site-title"><a href="{{ '/' | relative_url }}">📚 {{ site.title }}</a></h1>
        <p class="site-description">{{ site.description }}</p>
      </div>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.site-nav').classList.toggle('open')">☰</button>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>🏠 Home</a>
        <a href="{{ '/case-summaries/' | relative_url }}" {% if page.url == '/case-summaries/' %}class="active"{% endif %}>🔧 Case Studies</a>
        <a href="{{ '/deep-dive/' | relative_url }}" {% if page.url == '/deep-dive/' %}class="active"{% endif %}>📖 Deep Dive</a>
        <a href="{{ '/scenario-maps/' | relative_url }}" {% if page.url == '/scenario-maps/' %}class="active"{% endif %}>🗺️ Scenario Maps</a>
        <a href="{{ '/ai-learning/' | relative_url }}" {% if page.url == '/ai-learning/' %}class="active"{% endif %}>🤖 AI Learning</a>
        <a href="{{ '/education/' | relative_url }}" {% if page.url == '/education/' %}class="active"{% endif %}>📐 Education</a>
        <a href="{{ '/tsg/' | relative_url }}" {% if page.url == '/tsg/' %}class="active"{% endif %}>🛠️ TSG</a>
        <form class="nav-search" action="{{ '/search/' | relative_url }}" method="get">
          <input type="text" name="q" placeholder="🔍 Search..." aria-label="Search" class="nav-search-input">
        </form>
      </nav>
    </div>
  </header>
  <main class="container">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('code.language-mermaid').forEach(function(el) {
        var pre = el.parentElement;
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        pre.parentElement.replaceChild(div, pre);
      });
      mermaid.run();
    });
  </script>
  {% if site.firebase.databaseURL and site.firebase.databaseURL != "" %}
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "{{ site.firebase.apiKey }}",
      databaseURL: "{{ site.firebase.databaseURL }}",
      projectId: "{{ site.firebase.projectId }}"
    });
  </script>
  {% endif %}
</body>
</html>
