title: Case Knowledge Base
description: Support case summaries, troubleshooting notes, and lessons learned.
url: "https://Irishemin.github.io"
baseurl: "/knowledge_base"
markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Firebase Realtime Database for view counts and likes
# Setup: https://console.firebase.google.com
# 1. Create project → 2. Build > Realtime Database > Create Database
# 3. Set rules to: { "rules": { ".read": true, ".write": true } }
# 4. Fill in the values below from Project Settings > General > Your apps > Web app
firebase:
  apiKey: ""
  databaseURL: ""
  projectId: ""
